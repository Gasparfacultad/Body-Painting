<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Body Paint – Tienda Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ── FORMULARIOS ── -->
<section id="cuenta">
  <p class="section-label">Acceso</p>
  <h2 class="section-title">Mi cuenta</h2>

  <div class="forms-wrap">

    <!-- REGISTRO -->
    <div class="form-panel">
      <h2>Crear cuenta</h2>
      <p class="form-sub">Registrate para poder realizar compras y seguir tus pedidos.</p>

      <p class="form-section-label">Datos personales</p>

      <div class="form-row">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="María"/>
        </div>
        <div class="form-group">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" placeholder="García"/>
        </div>
      </div>

      <div class="form-group">
        <label for="email-reg">Correo electrónico</label>
        <input type="email" id="email-reg" placeholder="mail@ejemplo.com"/>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="pass-reg">Contraseña</label>
          <input type="password" id="pass-reg" placeholder="••••••••"/>
        </div>
      </div>


      <button class="form-submit" type="button">Crear mi cuenta</button>
    </div>

    <!-- LOGIN -->
    <div class="form-panel login-panel">
      <div class="login-icon">🔐</div>
      <h2>Bienvenido</h2>
      <p class="form-sub">Ingresá a tu cuenta para ver tus pedidos, cupones y más.</p>

      <div class="form-group">
        <label for="email-log">Correo electrónico</label>
        <input type="email" id="email-log" placeholder="mail@ejemplo.com"/>
      </div>

      <div class="form-group">
        <label for="pass-log">Contraseña</label>
        <input type="password" id="pass-log" placeholder="••••••••"/>
      </div>

      <div style="text-align:right;margin-top:-8px;margin-bottom:24px">
        <a href="#" style="font-size:12px;color:var(--muted);text-decoration:none">¿Olvidaste tu contraseña?</a>
      </div>

      <button class="form-submit" type="button">Iniciar sesión</button>
    </div>

  </div>
</section>

<!-- ── FOOTER ── -->
<div class="accent-bar"></div>
<footer>
  <div class="footer-logo">Metodología <span>de sistemas 2</span></div>
  <p>Grupo 4 - UTN FRVVM </p>
</footer>

<script>
  document.querySelectorAll('.pay-opt').forEach(opt=>{
    opt.addEventListener('click',function(){
      document.querySelectorAll('.pay-opt').forEach(o=>o.classList.remove('active'));
      this.classList.add('active');
    });
  });
</script>

</body>
</html>
