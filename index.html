<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Body Paint – Tienda Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ── FORMULARIOS ── -->
<section id="cuenta">
  <p class="section-label">Acceso</p>
  <h2 class="section-title">Mi cuenta</h2>

  <div class="forms-wrap">

    <!-- REGISTRO -->
    <form id="registerForm">

    <div class="form-row">
      <div class="form-group">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" placeholder="María" />
      </div>

      <div class="form-group">
        <label for="apellido">Apellido</label>
        <input type="text" id="apellido" placeholder="García" />
      </div>
    </div>

    <div class="form-group">
      <label for="email-reg">Correo electrónico</label>
      <input type="email" id="email-reg" placeholder="mail@ejemplo.com" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="pass-reg">Contraseña</label>
        <input type="password" id="pass-reg" placeholder="••••••••" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="pass-rep">Contraseña</label>
          <input type="password" id="pass-rep" placeholder="••••••••"/>
        </div>
      </div>
    </div>

    <p id="registerError"></p>
    <p id="registerSuccess"></p>

    <button class="form-submit" type="submit">Crear mi cuenta</button>

  </form>

    </div>

    <!-- LOGIN -->
  <div class="form-panel login-panel">

    <form id="loginForm">

      <div class="login-icon">🔐</div>

      <h2>Bienvenido</h2>

      <p class="form-sub">
        Ingresá a tu cuenta para ver tus pedidos, cupones y más.
      </p>

      <div class="form-group">
        <label for="email-log">Correo electrónico</label>
        <input
          type="email"
          id="email-log"
          placeholder="mail@ejemplo.com"
        />
      </div>

      <div class="form-group">
        <label for="pass-log">Contraseña</label>
        <input
          type="password"
          id="pass-log"
          placeholder="••••••••"
        />
      </div>

      <div style="text-align:right;margin-top:-8px;margin-bottom:24px">
        <a href="#" style="font-size:12px;color:var(--muted);text-decoration:none">
          ¿Olvidaste tu contraseña?
        </a>
      </div>

      <p id="loginError"></p>

      <button class="form-submit" type="submit">
        Iniciar sesión
      </button>

    </form>

  </div>

  </div>
</section>

<!-- ── FOOTER ── -->
<div class="accent-bar"></div>
<footer>
  <div class="footer-logo">Metodología <span>de sistemas 2</span></div>
  <p>Grupo 4 - UTN FRVVM </p>
</footer>

<!-- Modal Registro Exitoso -->
<div id="modalRegistro" class="modal">
    <div class="modal-content">
        <h3>✅ Registro exitoso</h3>
        <p>Tu cuenta fue creada correctamente.</p>
        <button id="btnRegistro">Aceptar</button>
    </div>
</div>

<!-- Modal Login Exitoso -->
<div id="modalLogin" class="modal">
    <div class="modal-content">
        <h3>🎉 Bienvenido</h3>
        <p>Inicio de sesión realizado correctamente.</p>
        <button id="btnLogin">Continuar</button>
    </div>
</div>

<script>
  document.querySelectorAll('.pay-opt').forEach(opt=>{
    opt.addEventListener('click',function(){
      document.querySelectorAll('.pay-opt').forEach(o=>o.classList.remove('active'));
      this.classList.add('active');
    });
  });
</script>

<script src="/Body-Painting/registro.js"></script>
<script src="/Body-Painting/exito.js"></script>
<script src="/Body-Painting/login.js"></script>

</body>
</html>
